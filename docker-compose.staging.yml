services:
  postgres:
    image: postgres:15-alpine
    container_name: masppt-postgres-staging
    restart: unless-stopped
    env_file:
      - .env.staging
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    container_name: masppt-redis-staging
    restart: unless-stopped
    volumes:
      - redis_staging_data:/data
    ports:
      - "6380:6379"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: masppt-minio-staging
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_staging_data:/data
    ports:
      - "9010:9000"
      - "9011:9001"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: masppt-backend-staging
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      OBJECT_STORAGE_BACKEND: s3
      OBJECT_STORAGE_ENDPOINT_URL: http://minio:9000
      OBJECT_STORAGE_PUBLIC_BASE_URL: ${OBJECT_STORAGE_PUBLIC_BASE_URL}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio
      - worker
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: masppt-worker-staging
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      OBJECT_STORAGE_BACKEND: s3
      OBJECT_STORAGE_ENDPOINT_URL: http://minio:9000
      OBJECT_STORAGE_PUBLIC_BASE_URL: ${OBJECT_STORAGE_PUBLIC_BASE_URL}
    expose:
      - "8001"
    depends_on:
      - postgres
      - redis
      - minio
    command: uvicorn worker_app:app --host 0.0.0.0 --port 8001

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    container_name: masppt-frontend-staging
    restart: unless-stopped
    ports:
      - "4173:80"
    depends_on:
      - backend

volumes:
  postgres_staging_data:
  redis_staging_data:
  minio_staging_data:
