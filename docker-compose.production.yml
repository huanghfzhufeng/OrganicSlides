services:
  postgres:
    image: postgres:15-alpine
    container_name: masppt-postgres-production
    restart: always
    env_file:
      - .env.production
    volumes:
      - postgres_production_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: masppt-redis-production
    restart: always
    volumes:
      - redis_production_data:/data

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: masppt-minio-production
    restart: always
    env_file:
      - .env.production
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_production_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: masppt-backend-production
    restart: always
    env_file:
      - .env.production
    environment:
      OBJECT_STORAGE_BACKEND: s3
      OBJECT_STORAGE_ENDPOINT_URL: http://minio:9000
      OBJECT_STORAGE_PUBLIC_BASE_URL: ${OBJECT_STORAGE_PUBLIC_BASE_URL}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio
      - worker
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: masppt-worker-production
    restart: always
    env_file:
      - .env.production
    environment:
      OBJECT_STORAGE_BACKEND: s3
      OBJECT_STORAGE_ENDPOINT_URL: http://minio:9000
      OBJECT_STORAGE_PUBLIC_BASE_URL: ${OBJECT_STORAGE_PUBLIC_BASE_URL}
    expose:
      - "8001"
    depends_on:
      - postgres
      - redis
      - minio
    command: uvicorn worker_app:app --host 0.0.0.0 --port 8001

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    container_name: masppt-frontend-production
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_production_data:
  redis_production_data:
  minio_production_data:
